# Enterprise Data Quality Platform
# Production-ready containerized setup
# Run with: docker compose up -d
# Access UI Dashboard: http://localhost:8000
# Access API Docs: http://localhost:8000/docs
# Access pgAdmin (with --profile admin): http://localhost:5050

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: dq-postgres
    restart: unless-stopped
    
    # Security: Run as postgres user (non-root)
    user: postgres
    
    # Security: Limit capabilities
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    
    # Security: Prevent privilege escalation
    security_opt:
      - no-new-privileges:true
    
    # Security: Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-test123}
      POSTGRES_DB: data_quality
      POSTGRES_INITDB_ARGS: "-E UTF8"
      TZ: UTC
    
    # Security: Don't expose port to host (internal network only)
    # Comment out for external database tools - use pgAdmin instead
    expose:
      - "5432"
    # ports:
    #   - "${POSTGRES_PORT:-5432}:5432"  # Only enable if needed externally
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    
    networks:
      - dq-network
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Data Quality Platform API Service
  data-quality-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: data-quality-api:latest
    container_name: dq-platform-api
    restart: unless-stopped
    
    # Security: Run as non-root user
    user: "1000:1000"
    
    # Security: Limit container capabilities
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    
    # Security: Prevent privilege escalation
    security_opt:
      - no-new-privileges:true
    
    # Security: Read-only root filesystem (except writable volumes)
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    
    # Security: Resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    
    ports:
      - "${API_PORT:-8000}:8000"
    
    volumes:
      # Mount volumes for write operations
      - ./logs:/app/logs:rw
      - ./reports:/app/reports:rw
      - ./data:/app/data:ro  # Read-only data access
    
    environment:
      # Application settings
      ENVIRONMENT: ${ENVIRONMENT:-production}
      PYTHONUNBUFFERED: 1
      # DuckDB configuration - use temp directory for database
      DUCKDB_PATH: /tmp/my_database.myduckdb
      # Database settings
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-test123}
      POSTGRES_DB: data_quality
      # Storage backend
      STORAGE_BACKEND: postgresql
    
    depends_on:
      postgres:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    networks:
      - dq-network
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # React Frontend Service
  data-quality-frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    image: data-quality-frontend:latest
    container_name: dq-platform-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
      NODE_ENV: production
    depends_on:
      data-quality-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - dq-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx Reverse Proxy (Optional - for production routing)
  nginx:
    image: nginx:alpine
    container_name: dq-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./infrastructure/docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - data-quality-frontend
      - data-quality-api
    networks:
      - dq-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # pgAdmin for database management (optional - use --profile admin to start)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dq-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@company.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - dq-network
    profiles:
      - admin
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  dq-network:
    driver: bridge
    # Security: Isolate network
    internal: false  # Set to true for complete isolation (no external access)
    driver_opts:
      com.docker.network.bridge.name: "dq-bridge"
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
