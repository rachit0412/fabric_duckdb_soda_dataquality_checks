# Enterprise Data Quality Platform
# Production-ready containerized setup
# Run with: docker compose up -d
# Access UI Dashboard: http://localhost:8000
# Access API Docs: http://localhost:8000/docs
# Access pgAdmin (with --profile admin): http://localhost:5050

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: dq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-test123}
      POSTGRES_DB: data_quality
      POSTGRES_INITDB_ARGS: "-E UTF8"
      TZ: UTC
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dq-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Data Quality Platform API Service
  data-quality-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: data-quality-api:latest
    container_name: dq-platform-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      # Application settings
      ENVIRONMENT: ${ENVIRONMENT:-production}
      PYTHONUNBUFFERED: 1
      # Database settings
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-test123}
      POSTGRES_DB: data_quality
      # Storage backend
      STORAGE_BACKEND: postgresql
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - dq-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # pgAdmin for database management (optional - use --profile admin to start)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dq-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@company.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - dq-network
    profiles:
      - admin
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  dq-network:
    driver: bridge
