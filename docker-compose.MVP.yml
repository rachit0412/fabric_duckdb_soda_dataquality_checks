version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mvp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dq_user
      POSTGRES_PASSWORD: dq_password
      POSTGRES_DB: dq_platform
      TZ: UTC
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dq_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.MVP
    container_name: mvp-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://dq_user:dq_password@postgres:5432/dq_platform
      DEBUG: "true"
      LOG_LEVEL: INFO
      API_HOST: 0.0.0.0
      API_PORT: 8000
      CORS_ORIGINS: http://localhost:3000,http://localhost
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: >
      sh -c "python -m alembic upgrade head 2>/dev/null || true &&
             python -m uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.MVP
    container_name: mvp-frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
      REACT_APP_API_BASE: /api/v1
    volumes:
      - ./frontend/src:/app/src
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:

networks:
  default:
    name: mvp-network
