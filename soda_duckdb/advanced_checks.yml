# USAGE: HOW TO USE THESE CHECKS
# ═══════════════════════════════════════════════════════════════════════════════
#
# 1. Copy your table-specific rules from above examples
# 2. Replace {your_table_name} with your actual table name
# 3. Customize the column names and thresholds for your data
# 4. Place in: soda_duckdb/checks.yml
# 5. Upload CSV file via API or web UI
# 6. Check results for pass/fail status
