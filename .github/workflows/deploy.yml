name: Deploy

on:
  release:
    types: [created]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Get release version
        id: release
        run: |
          VERSION=${{ github.event.release.tag_name }}
          echo "version=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.release.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.release.outputs.version }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate deployment documentation
        run: |
          cat > DEPLOYMENT_MANIFEST.md << 'EOF'
          # Deployment Manifest
          
          **Version:** ${{ steps.release.outputs.version }}
          **Release Date:** $(date -u +'%Y-%m-%dT%H:%M:%SZ')
          **Docker Image:** ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.release.outputs.version }}
          
          ## Deployment Steps
          
          ### Prerequisites
          - Docker >= 20.10
          - Docker Compose >= 2.0
          - Python 3.11+
          - Node.js 18+
          
          ### Option 1: Docker Compose
          
          ```bash
          # Clone repository
          git clone ${{ github.server_url }}/${{ github.repository }}.git
          cd fabric_duckdb_soda_dataquality_checks
          
          # Create .env file
          cp .env.example .env
          
          # Update .env with your configuration
          
          # Deploy
          docker-compose -f docker-compose.prod.yml up -d
          ```
          
          ### Option 2: Kubernetes (with Helm)
          
          ```bash
          # Add Helm repository
          helm repo add data-quality https://helm.example.com
          
          # Install release
          helm install data-quality data-quality/platform \
            --version ${{ steps.release.outputs.version }} \
            -f values.yaml
          ```
          
          ### Option 3: Manual Deployment
          
          ```bash
          # Pull Docker image
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.release.outputs.version }}
          
          # Create volumes
          docker volume create dq_data
          docker volume create dq_logs
          
          # Run container
          docker run -d \
            --name data-quality-api \
            -p 8000:8000 \
            -e DATABASE_URL=postgresql://user:pass@db:5432/dq_db \
            -v dq_data:/data \
            -v dq_logs:/logs \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.release.outputs.version }}
          ```
          
          ## Configuration
          
          Required environment variables:
          - `DATABASE_URL`: PostgreSQL connection string
          - `CORS_ORIGINS`: Comma-separated allowed origins
          - `SECRET_KEY`: API secret key
          - `LOG_LEVEL`: Logging level (INFO, DEBUG, etc)
          
          ## Health Check
          
          ```bash
          curl http://localhost:8000/health
          ```
          
          Expected response:
          ```json
          {
            "status": "healthy",
            "database": "connected",
            "version": "${{ steps.release.outputs.version }}"
          }
          ```
          
          ## Rollback
          
          ```bash
          # If using Docker Compose
          git checkout <previous-version>
          docker-compose -f docker-compose.prod.yml down
          docker-compose -f docker-compose.prod.yml up -d
          
          # Check new version
          curl http://localhost:8000/health
          ```
          
          ## Support
          
          - Documentation: see /docs/DEPLOYMENT.md
          - Issues: ${{ github.server_url }}/${{ github.repository }}/issues
          - Releases: ${{ github.server_url }}/${{ github.repository }}/releases
          EOF

      - name: Upload deployment manifest
        uses: actions/upload-artifact@v3
        with:
          name: deployment-manifest
          path: DEPLOYMENT_MANIFEST.md

      - name: Create release notes
        uses: softprops/action-gh-release@v1
        with:
          body_path: DEPLOYMENT_MANIFEST.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify deployment
        run: |
          echo "✅ Deployment completed successfully"
          echo "Version: ${{ steps.release.outputs.version }}"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.release.outputs.version }}"

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install test dependencies
        run: npm install @playwright/test

      - name: Run smoke tests
        run: npx playwright test tests/smoke/ --reporter=html

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
